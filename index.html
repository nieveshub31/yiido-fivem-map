<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yyiido nieves - Ultimate Map v1.4</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00ff00;
            --danger-color: #ff4444;
            --info-color: #00d4ff;
            --bg-dark: #080c10;
            --panel-bg: rgba(13, 17, 23, 0.98);
            --border-color: #30363d;
            --input-bg: #0d1117;
            --text-main: #e6edf3;
            --font-tech: 'JetBrains Mono', monospace;
        }
        
        body, html, #map { margin: 0; padding: 0; height: 100vh; width: 100vw; background: var(--bg-dark); overflow: hidden; font-family: 'Inter', sans-serif; }
        * { box-sizing: border-box; cursor: crosshair !important; }

        /* GİRİŞ EKRANI */
        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at center, #111b27 0%, #080c10 100%); 
            z-index: 9999; display: flex; align-items: center; justify-content: center; 
        }
        .login-box { 
            background: rgba(22, 27, 34, 0.9); padding: 40px; border-radius: 20px; 
            border: 1px solid var(--border-color); text-align: center; width: 350px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); backdrop-filter: blur(20px);
        }
        .login-box input { 
            padding: 15px; width: 100%; border-radius: 10px; border: 1px solid var(--border-color); 
            background: var(--input-bg); color: white; margin-bottom: 15px; outline: none; text-align: center; font-family: var(--font-tech);
        }
        .login-box button { 
            width: 100%; padding: 15px; background: var(--primary-color); border: none; 
            font-weight: 900; border-radius: 10px; color: #000; text-transform: uppercase; font-family: var(--font-tech);
        }

        #main-content { display: none; }
        #map { z-index: 1; }

        /* ÜST BUTONLAR */
        .top-btn {
            position: fixed; z-index: 1001; top: 15px;
            background: var(--panel-bg); color: #fff; padding: 12px 20px;
            border-radius: 10px; border: 1px solid var(--border-color);
            font-family: var(--font-tech); font-weight: 900; font-size: 13px;
            transition: 0.3s;
        }
        #main-logo { left: 15px; }
        #nav-toggle { right: 15px; border-color: var(--info-color); color: var(--info-color); }

        /* SOL PANEL */
        #controls {
            position: fixed; top: 75px; left: 15px; z-index: 1000;
            background: var(--panel-bg); padding: 20px; border-radius: 15px;
            border: 1px solid var(--border-color); width: 260px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.4s;
        }
        #controls.collapsed { transform: translateX(-320px); opacity: 0; }

        /* SAĞ PANEL (GTA NAV) */
        #right-nav {
            position: fixed; top: 75px; right: 15px; z-index: 1000;
            background: var(--panel-bg); border-radius: 15px;
            border: 1px solid var(--border-color); width: 240px;
            max-height: 75vh; display: flex; flex-direction: column;
            transition: 0.4s; transform: translateX(300px);
        }
        #right-nav.active { transform: translateX(0); }
        .nav-header { padding: 15px; font-family: var(--font-tech); font-size: 11px; border-bottom: 1px solid var(--border-color); color: var(--info-color); font-weight: 800; }
        #nav-list { overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        .nav-item { 
            padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); 
            transition: 0.2s; display: flex; align-items: center; gap: 10px; font-size: 12px; font-weight: 700;
        }
        .nav-item:hover { background: var(--primary-color); color: #000; }

        /* MARKER TASARIMI */
        .pixel-marker { display: flex; align-items: center; justify-content: center; }
        .icon-box { 
            width: 100%; height: 100%; border-radius: 50%; background-size: cover !important; 
            position: relative; border: 2px solid transparent; transition: 0.3s;
        }
        .marker-label {
            position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #fff; padding: 3px 8px; border-radius: 4px;
            font-size: 11px; font-family: var(--font-tech); white-space: nowrap;
            border: 1px solid var(--primary-color); pointer-events: none;
        }

        /* TIKLAMA EFEKTİ */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 15px rgba(255,255,255,0); transform: scale(1.2); }
            100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); transform: scale(1); }
        }
        .effect-active { animation: pulse 0.6s ease-out 3; border: 3px solid white !important; z-index: 9999 !important; }

        /* FORM */
        .section-title { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-family: var(--font-tech); margin-bottom: 5px; display: block; }
        input[type="text"], select { width: 100%; background: #000; color: #fff; border: 1px solid var(--border-color); padding: 8px; border-radius: 5px; font-size: 12px; margin-bottom: 10px; font-family: var(--font-tech); }
        .btn-action { width: 100%; padding: 10px; border-radius: 8px; border: none; font-weight: 800; font-family: var(--font-tech); font-size: 11px; margin-bottom: 5px; }

        .fill-red { border-color: var(--danger-color); background: rgba(255,68,68,0.3); }
        .fill-green { border-color: var(--primary-color); background: rgba(0,255,0,0.3); }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="color:#fff; font-family:var(--font-tech); letter-spacing:3px;">SISTEM KILIDI</h2>
        <input type="password" id="passInput" placeholder="SIFREYI GIR">
        <button onclick="checkLogin()">GIRIS YAP</button>
    </div>
</div>

<div id="main-content">
    <div id="main-logo" class="top-btn" onclick="togglePanel()">KNGLRP</div>
    <div id="nav-toggle" class="top-btn" onclick="toggleRightNav()">NAVIGASYON</div>

    <div id="controls">
        <span class="section-title">HARITA</span>
        <input type="file" id="mapInput" accept="image/*">
        
        <span class="section-title" style="margin-top:15px;">YENI ISARETCI</span>
        <input type="text" id="mText" placeholder="ISIM YAZ...">
        <select id="mType">
            <option value="green">GÜVENLI</option>
            <option value="red">TEHLIKELI</option>
            <option value="img">ÖZEL IKON</option>
        </select>
        <input type="file" id="mImg" accept="image/*">
        
        <button class="btn-action" style="background:var(--info-color); margin-top:10px;" onclick="exportData()">KODU AL</button>
        <button class="btn-action" style="background:#222; color:#fff;" onclick="location.reload()">CIKIS</button>
    </div>

    <div id="right-nav">
        <div class="nav-header">KAYITLI NOKTALAR</div>
        <ul id="nav-list"></ul>
    </div>

    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const _p = "knglrpsikersakatbırakır";
    let db, savedMarkers = [], markerInstances = {}, customIcon = null;

    function checkLogin() {
        if(document.getElementById('passInput').value === _p) {
            sessionStorage.setItem('map_auth', 'true');
            showMainContent();
        } else { alert("Siktir git, yanlış şifre."); }
    }

    function showMainContent() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        initDB();
    }

    window.onload = () => { if(sessionStorage.getItem('map_auth') === 'true') showMainContent(); };

    function togglePanel() { document.getElementById('controls').classList.toggle('collapsed'); }
    function toggleRightNav() { document.getElementById('right-nav').classList.toggle('active'); }

    function initDB() {
        const req = indexedDB.open("UltraMapDB", 1);
        req.onupgradeneeded = e => {
            let d = e.target.result;
            d.createObjectStore("config");
            d.createObjectStore("markers", { keyPath: "id" });
        };
        req.onsuccess = e => {
            db = e.target.result;
            loadStoredData();
        };
    }

    function loadStoredData() {
        db.transaction("config").objectStore("config").get("img").onsuccess = e => {
            if(e.target.result) initMap(e.target.result);
        };
        db.transaction("markers").objectStore("markers").getAll().onsuccess = e => {
            savedMarkers = e.target.result || [];
            renderMarkers();
        };
    }

    let map, mapLayer, markerLayer;
    function initMap(imgUrl) {
        if(map) return;
        map = L.map('map', { crs: L.CRS.Simple, minZoom: -3, maxZoom: 3, zoomControl: false });
        markerLayer = L.layerGroup().addTo(map);
        
        const img = new Image();
        img.onload = function() {
            const bounds = [[0, 0], [this.height, this.width]];
            mapLayer = L.imageOverlay(imgUrl, bounds).addTo(map);
            map.fitBounds(bounds);
        };
        img.src = imgUrl;

        map.on('click', e => {
            const name = document.getElementById('mText').value || "Bilinmeyen";
            const data = {
                id: Date.now(), lat: e.latlng.lat, lng: e.latlng.lng,
                text: name, type: document.getElementById('mType').value,
                img: document.getElementById('mType').value === 'img' ? customIcon : null
            };
            db.transaction("markers", "readwrite").objectStore("markers").add(data);
            savedMarkers.push(data);
            document.getElementById('mText').value = "";
            renderMarkers();
        });
    }

    document.getElementById('mapInput').onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
            db.transaction("config", "readwrite").objectStore("config").put(ev.target.result, "img");
            location.reload();
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    document.getElementById('mImg').onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => { customIcon = ev.target.result; document.getElementById('mType').value = 'img'; };
        reader.readAsDataURL(e.target.files[0]);
    };

    function renderMarkers() {
        if(!markerLayer) return;
        markerLayer.clearLayers();
        markerInstances = {};
        const list = document.getElementById('nav-list');
        list.innerHTML = "";

        savedMarkers.forEach(d => {
            // Liste
            const li = document.createElement('li');
            li.className = 'nav-item';
            li.innerHTML = `<span style="color:${d.type==='green'?'#0f0':'#f44'}">●</span> ${d.text}`;
            li.onclick = () => focusMarker(d.id);
            list.appendChild(li);

            // Harita
            const mClass = d.type === 'green' ? 'fill-green' : (d.type === 'red' ? 'fill-red' : '');
            const icon = L.divIcon({
                className: 'pixel-marker',
                iconSize: [40, 40],
                iconAnchor: [20, 20],
                html: `<div class="icon-box ${mClass}" style="${d.img?'background-image:url('+d.img+')':''}">
                        <div class="marker-label">${d.text}</div>
                       </div>`
            });
            const m = L.marker([d.lat, d.lng], { icon: icon }).addTo(markerLayer);
            markerInstances[d.id] = m;

            m.on('contextmenu', () => {
                db.transaction("markers", "readwrite").objectStore("markers").delete(d.id);
                savedMarkers = savedMarkers.filter(x => x.id !== d.id);
                renderMarkers();
            });
        });
    }

    function focusMarker(id) {
        const d = savedMarkers.find(x => x.id === id);
        const m = markerInstances[id];
        if(d && m) {
            map.flyTo([d.lat, d.lng], 1, { duration: 1 });
            const box = m.getElement().querySelector('.icon-box');
            box.classList.add('effect-active');
            setTimeout(() => box.classList.remove('effect-active'), 2000);
            if(window.innerWidth < 768) toggleRightNav();
        }
    }

    function exportData() {
        navigator.clipboard.writeText(JSON.stringify(savedMarkers));
        alert("Koordinat kodları kopyalandı!");
    }

    document.getElementById('passInput').onkeypress = e => { if(e.key==='Enter') checkLogin() };
</script>
</body>
</html>
