<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yyiido nieves - Map System v8</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary-color: #00ff00; /* Neon Yeşil */
            --danger-color: #ff4444;  /* Neon Kırmızı */
            --bg-dark: #080c10;
            --panel-bg: rgba(13, 17, 23, 0.96);
            --border-color: #21262d;
            --input-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
        }
        
        body { margin: 0; padding: 0; background: var(--bg-dark); font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: var(--text-main); overflow: hidden; }
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }

        /* Giriş Ekranı */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: #161b22; padding: 40px; border-radius: 16px; border: 1px solid #30363d; text-align: center; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .login-box h2 { color: var(--primary-color); letter-spacing: 2px; margin-bottom: 25px; font-size: 20px; font-weight: 800; }
        .login-box input[type="password"] { padding: 15px; width: 100%; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; margin-bottom: 20px; outline: none; transition: 0.2s; }
        .login-box input[type="password"]:focus { border-color: var(--primary-color); box-shadow: 0 0 5px rgba(0,255,0,0.3); }
        .login-box button { width: 100%; padding: 15px; background: var(--primary-color); border: none; font-weight: bold; cursor: pointer; border-radius: 8px; color: #000; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .login-box button:hover { background: #00cc00; transform: translateY(-1px); }

        /* Ana İçerik */
        #main-content { display: none; }
        #map { height: 100vh; width: 100vw; background: var(--bg-dark); z-index: 1; }

        /* KNGLRP Logo Buton */
        #main-logo {
            position: fixed; top: 15px; left: 15px; z-index: 1001;
            font-weight: 900; font-size: 15px; letter-spacing: 3px;
            color: #fff; background: var(--panel-bg); padding: 10px 18px;
            border-radius: 8px; border: 1px solid #30363d;
            cursor: pointer; transition: 0.3s;
            user-select: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #main-logo:hover { border-color: var(--primary-color); color: var(--primary-color); box-shadow: 0 0 10px rgba(0,255,0,0.5); }

        /* Sol Kontrol Paneli (Düzeltilmiş Tasarım) */
        #controls {
            position: fixed; top: 70px; left: 15px; z-index: 1000;
            background: var(--panel-bg); padding: 20px; border-radius: 12px;
            border: 1px solid var(--border-color); width: 260px; /* Biraz daha daraltıldı */
            box-shadow: 0 8px 32px rgba(0,0,0,0.6); backdrop-filter: blur(15px); /* Daha güçlü blur */
            max-height: 85vh; overflow-y: auto; overflow-x: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #controls.collapsed { transform: translateY(-10px) translateX(-300px); opacity: 0; pointer-events: none; }

        .panel-header { font-size: 12px; font-weight: 800; color: var(--primary-color); margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .section { margin-bottom: 18px; }
        .section-title { font-size: 9px; font-weight: 900; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; display: block; }
        .input-group { background: var(--input-bg); border-radius: 8px; padding: 10px; border: 1px solid #21262d; margin-bottom: 8px; }
        
        input[type="file"], select { width: 100%; cursor: pointer; background: #0d1117; color: var(--text-main); border: 1px solid #30363d; border-radius: 6px; padding: 7px; outline: none; font-size: 11px; }
        input[type="file"] { color: var(--text-muted); }
        
        /* Switch Tasarımı */
        .switch-group { display: flex; align-items: center; justify-content: space-between; background: var(--input-bg); padding: 10px; border-radius: 8px; border: 1px solid #21262d; margin-bottom: 6px; }
        .switch { position: relative; display: inline-block; width: 36px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #30363d; transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: #8b949e; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(18px); background-color: #000; }

        input[type="range"] { width: 100%; accent-color: var(--primary-color); margin-top: 8px; cursor: pointer; }

        /* Butonlar */
        .btn-action { width: 100%; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 8px; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
        .btn-clear { background: rgba(244, 67, 54, 0.1); color: #f44336; border: 1px solid rgba(244, 67, 54, 0.4); }
        .btn-clear:hover { background: #f44336; color: #fff; border-color: #f44336; }
        .btn-logout { background: #21262d; color: var(--text-main); border: 1px solid #30363d; margin-top: 20px; }
        .btn-logout:hover { background: #30363d; color: #fff; }

        /* Marker Styles (Yeni Şeffaf ve Parlayan Tasarım) */
        .pixel-marker { border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; background: transparent !important; }
        .pixel-marker div { width: 100%; height: 100%; border-radius: 50%; background-size: cover !important; }
        
        /* Özel Efektler İçin Sınıflar */
        .glow-red { border: 3px solid var(--danger-color); box-shadow: 0 0 15px var(--danger-color), inset 0 0 5px rgba(255,68,68,0.3); }
        .glow-green { border: 3px solid var(--primary-color); box-shadow: 0 0 15px var(--primary-color), inset 0 0 5px rgba(0,255,0,0.3); }
        .glow-black { border: 3px solid #000000; box-shadow: 0 0 5px rgba(255,255,255,0.2); } /* Siyah için hafif dış aydınlatma */
    </style>
</head>
<body oncontextmenu="return false;"> <div id="login-overlay">
    <div class="login-box">
        <h2>SİSTEME GİRİŞ</h2>
        <input type="password" id="passInput" placeholder="Erişim Şifresi">
        <label style="display:flex; align-items:center; gap:8px; margin-bottom:20px; cursor:pointer; font-size:13px; color:var(--text-muted);">
            <input type="checkbox" id="rememberCheck" style="accent-color:var(--primary-color)"> Beni Hatırla
        </label>
        <button onclick="checkLogin()">KİLİDİ AÇ</button>
        <p id="error-msg" style="color:var(--danger-color); font-size:11px; margin-top:15px; display:none; font-weight:bold;">Hatalı şifre!</p>
    </div>
</div>

<div id="main-content">
    <div id="main-logo" onclick="togglePanel()">KNGLRP</div>

    <div id="controls">
        <div class="panel-header">KONTROL PANELİ</div>
        
        <div class="section">
            <span class="section-title">HARİTA KATMANI</span>
            <div class="input-group"><input type="file" id="mainMapInput" accept="image/*"></div>
        </div>

        <div class="section">
            <span class="section-title">İŞARETÇİ AYARLARI</span>
            <div class="input-group">
                <input type="file" id="markerImgInput" accept="image/*" style="margin-bottom:10px">
                <select id="typeSelect">
                    <option value="green">🟢 Yeşil Neon Çember</option>
                    <option value="red">🔴 Kırmızı Neon Çember</option>
                    <option value="black">⚫ Siyah Çember (Boş)</option>
                    <option value="custom_img">🖼️ Özel İkon</option>
                </select>
                <div style="margin-top: 10px;">
                    <span style="font-size:9px; color:var(--text-muted); text-transform:uppercase;">Boyut</span>
                    <input type="range" id="sizeSlider" min="15" max="150" value="45">
                </div>
            </div>
        </div>

        <div class="section">
            <span class="section-title">MOD KONTROLLERİ</span>
            <div class="switch-group">
                <span style="font-size:11px; color:var(--text-main);">Düzenleme (Taşı/Sil)</span>
                <label class="switch"><input type="checkbox" id="editMode" checked onchange="refreshMap()"><span class="slider"></span></label>
            </div>
            <div class="switch-group">
                <span style="font-size:11px; color:var(--primary-color); font-weight:bold;">İŞARETÇİ EKLEME</span>
                <label class="switch"><input type="checkbox" id="addMode" checked><span class="slider"></span></label>
            </div>
            <p style="font-size: 9px; color: var(--text-muted); margin: 6px 0 0 4px;">* Haritayı hareket ettirmek için "Ekleme" modunu kapatın.</p>
        </div>

        <div class="section" style="border-top: 1px solid var(--border-color); padding-top: 15px;">
            <span class="section-title">VERİ YÖNETİMİ</span>
            <button class="btn-action btn-clear" onclick="confirmClear()">TÜMÜNÜ SİL</button>
            <button class="btn-action btn-logout" onclick="logout()">OTURUMU KAPAT</button>
        </div>
    </div>
    
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Şifre aynı: hayatçokzorya
    const _pArr = ['h','a','y','a','t','ç','o','k','z','o','r','y','a'];

    function checkLogin() {
        if (document.getElementById('passInput').value === _pArr.join('')) {
            if (document.getElementById('rememberCheck').checked) localStorage.setItem('map_session_v8', 'active');
            else sessionStorage.setItem('map_session_v8', 'active');
            showMainContent();
        } else { document.getElementById('error-msg').style.display = 'block'; }
    }

    function togglePanel() { document.getElementById('controls').classList.toggle('collapsed'); }

    function showMainContent() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        initApp();
    }

    window.onload = () => { if (localStorage.getItem('map_session_v8')==='active' || sessionStorage.getItem('map_session_v8')==='active') showMainContent(); };

    function logout() { localStorage.clear(); sessionStorage.clear(); location.reload(); }

    let globalApp = null; 
    function refreshMap() { if(globalApp) globalApp.render(); }
    
    function confirmClear() {
        if(confirm("DİKKAT! Tüm işaretçiler kalıcı olarak silinecek. Emin misin aşkım?")) {
            if(globalApp) globalApp.clearMarkers();
        }
    }

    function initApp() {
        const dbName = "MapStore_v8"; // Sürüm yükseltildi
        let db, savedMarkers = [], customIcon = null;
        const map = L.map('map', { crs: L.CRS.Simple, minZoom: -3, maxZoom: 3, zoomControl: false });
        let mapLayer = null, markerLayer = L.layerGroup().addTo(map);

        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            if(!db.objectStoreNames.contains("config")) db.createObjectStore("config");
            if(!db.objectStoreNames.contains("markers")) db.createObjectStore("markers", { keyPath: "id" });
        };

        request.onsuccess = e => {
            db = e.target.result;
            db.transaction("config").objectStore("config").get("img").onsuccess = ev => { if(ev.target.result) loadMap(ev.target.result); };
            db.transaction("markers").objectStore("markers").getAll().onsuccess = ev => { savedMarkers = ev.target.result || []; render(); };
        };

        function loadMap(url) {
            const img = new Image();
            img.onload = function() {
                if (mapLayer) map.removeLayer(mapLayer);
                const bounds = [[0, 0], [this.height, this.width]];
                mapLayer = L.imageOverlay(url, bounds).addTo(map);
                map.fitBounds(bounds);
                render();
            };
            img.src = url;
        }

        document.getElementById('mainMapInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                db.transaction("config", "readwrite").objectStore("config").put(ev.target.result, "img");
                loadMap(ev.target.result);
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('markerImgInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => { customIcon = ev.target.result; document.getElementById('typeSelect').value = 'custom_img'; };
            reader.readAsDataURL(e.target.files[0]);
        };

        map.on('click', e => {
            // Ekleme modu kapalıysa hiçbir şey yapma (kaydırmaya izin ver)
            if (!mapLayer || !document.getElementById('addMode').checked) return;
            
            const markerData = { 
                id: Date.now(), lat: e.latlng.lat, lng: e.latlng.lng, 
                size: parseInt(document.getElementById('sizeSlider').value), 
                type: document.getElementById('typeSelect').value, 
                img: document.getElementById('typeSelect').value === 'custom_img' ? customIcon : null 
            };
            
            db.transaction("markers", "readwrite").objectStore("markers").add(markerData);
            savedMarkers.push(markerData);
            render();
        });

        function render() {
            markerLayer.clearLayers();
            const isEditable = document.getElementById('editMode').checked;
            
            savedMarkers.forEach(d => {
                // Renk ve parlama sınıfını belirle
                let glowClass = '';
                if (d.type === 'red') glowClass = 'glow-red';
                else if (d.type === 'green') glowClass = 'glow-green';
                else if (d.type === 'black') glowClass = 'glow-black';

                // Şeffaf yapı ve özel parıltı sınıfları
                const style = `
                    background-image:${d.img?'url('+d.img+')':'none'};
                `;
                
                const icon = L.divIcon({ 
                    className: `pixel-marker ${glowClass}`, // Sınıfı buraya ekledik
                    iconSize: [d.size, d.size], 
                    iconAnchor: [d.size/2, d.size/2], 
                    html: `<div style="${style}"></div>` 
                });

                const m = L.marker([d.lat, d.lng], { icon: icon, draggable: isEditable }).addTo(markerLayer);
                
                if(isEditable) {
                    m.on('dragend', ev => {
                        const found = savedMarkers.find(x => x.id === d.id);
                        found.lat = ev.target.getLatLng().lat; found.lng = ev.target.getLatLng().lng;
                        db.transaction("markers", "readwrite").objectStore("markers").put(found);
                    });
                    m.on('contextmenu', () => {
                        db.transaction("markers", "readwrite").objectStore("markers").delete(d.id);
                        savedMarkers = savedMarkers.filter(x => x.id !== d.id); 
                        render();
                    });
                }
            });
        }

        function clearMarkers() {
            db.transaction("markers", "readwrite").objectStore("markers").clear();
            savedMarkers = [];
            render();
        }

        globalApp = { render, clearMarkers };
    }
    document.getElementById('passInput').addEventListener('keypress', e => { if(e.key==='Enter') checkLogin() });
</script>
</body>
</html>
