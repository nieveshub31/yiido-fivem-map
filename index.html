<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yyiido nieves - Map System v9.5 (Sharing Edition)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00ff00;
            --danger-color: #ff4444;
            --info-color: #00d4ff;
            --bg-dark: #080c10;
            --panel-bg: rgba(13, 17, 23, 0.96);
            --border-color: #30363d;
            --input-bg: #0d1117;
            --text-main: #e6edf3;
            --text-muted: #8b949e;
            --font-main: 'Inter', sans-serif;
            --font-tech: 'JetBrains Mono', monospace;
        }
        
        body, html, #map, .leaflet-container, * { cursor: crosshair !important; }
        body { margin: 0; padding: 0; background: var(--bg-dark); font-family: var(--font-main); color: var(--text-main); overflow: hidden; }
        * { box-sizing: border-box; }

        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at center, #111b27 0%, #080c10 100%); 
            z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .login-box { 
            background: rgba(22, 27, 34, 0.85); padding: 50px 40px; border-radius: 24px; 
            border: 1px solid rgba(48, 54, 61, 0.5); text-align: center; width: 400px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); backdrop-filter: blur(25px);
        }
        .login-box h2 { color: #fff; letter-spacing: 5px; margin-bottom: 30px; font-size: 20px; font-weight: 900; font-family: var(--font-tech); }
        .login-box input[type="password"] { 
            padding: 18px; width: 100%; border-radius: 12px; border: 1px solid var(--border-color); 
            background: var(--input-bg); color: white; margin-bottom: 15px; outline: none; 
            text-align: center; font-family: var(--font-tech); font-size: 16px;
        }
        .login-box button { 
            width: 100%; padding: 18px; background: var(--primary-color); border: none; 
            font-weight: 900; border-radius: 12px; color: #000; transition: 0.3s; 
            text-transform: uppercase; font-family: var(--font-tech);
        }

        #main-content { display: none; }
        #map { height: 100vh; width: 100vw; background: var(--bg-dark); z-index: 1; }

        .top-controls { position: fixed; top: 15px; left: 15px; z-index: 1001; display: flex; gap: 10px; }
        #main-logo, #help-btn {
            font-weight: 900; font-size: 14px; color: #fff; background: var(--panel-bg); 
            padding: 12px 20px; border-radius: 10px; border: 1px solid var(--border-color); 
            transition: 0.3s; cursor: pointer !important; font-family: var(--font-tech);
        }

        #controls {
            position: fixed; top: 75px; left: 15px; z-index: 1000;
            background: var(--panel-bg); padding: 24px; border-radius: 16px;
            border: 1px solid var(--border-color); width: 275px;
            max-height: 85vh; overflow-y: auto; transition: 0.4s;
        }
        #controls.collapsed { transform: translateX(-320px); opacity: 0; pointer-events: none; }

        .panel-header { font-family: var(--font-tech); font-size: 11px; font-weight: 800; color: var(--primary-color); margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; text-transform: uppercase; }
        .section { margin-bottom: 18px; }
        .section-title { font-family: var(--font-tech); font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; display: block; }
        .input-group { background: var(--input-bg); border-radius: 10px; padding: 12px; border: 1px solid var(--border-color); }
        
        select, input[type="file"], textarea { width: 100%; background: #080c10; color: var(--text-main); border: 1px solid var(--border-color); border-radius: 8px; padding: 8px; font-size: 12px; outline: none; font-family: var(--font-tech); }
        
        .switch-group { display: flex; align-items: center; justify-content: space-between; background: var(--input-bg); padding: 12px; border-radius: 10px; border: 1px solid var(--border-color); margin-bottom: 8px; font-size: 12px; font-weight: 700; }
        .switch { position: relative; width: 38px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer !important; top: 0; left: 0; right: 0; bottom: 0; background: #21262d; border-radius: 20px; transition: .3s; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: #8b949e; border-radius: 50%; transition: .3s; }
        input:checked + .slider { background: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(18px); background: #000; }

        .btn-action { width: 100%; padding: 10px; border-radius: 8px; border: none; font-weight: 800; font-size: 10px; text-transform: uppercase; font-family: var(--font-tech); transition: 0.2s; cursor: pointer !important; margin-bottom: 5px; }
        .btn-share { background: var(--info-color); color: #000; }
        .btn-import { background: #fff; color: #000; }
        .btn-clear { background: rgba(244, 67, 54, 0.1); color: #f44336; border: 1px solid rgba(244, 67, 54, 0.3); }

        .pixel-marker { border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .pixel-marker div { width: 100%; height: 100%; border-radius: 50%; background-size: cover !important; }
        .fill-red { border: 3px solid var(--danger-color); background: rgba(255, 68, 68, 0.35) !important; }
        .fill-green { border: 3px solid var(--primary-color); background: rgba(0, 255, 0, 0.35) !important; }
        .hollow-black { border: 3px solid #000; background: transparent !important; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="login-overlay">
    <div class="login-box">
        <h2>HOŞGELDİN CANIMIN İÇİ</h2>
        <input type="password" id="passInput" placeholder="ŞİFREYİ SALLA">
        <button onclick="checkLogin()">KAPIYI TIKLAT</button>
    </div>
</div>

<div id="main-content">
    <div class="top-controls">
        <div id="main-logo" onclick="togglePanel()">KNGLRP</div>
    </div>

    <div id="controls">
        <div class="panel-header">OPERASYON MERKEZİ</div>
        
        <div class="section">
            <span class="section-title">HARİTA YÜKLE</span>
            <div class="input-group"><input type="file" id="mainMapInput" accept="image/*"></div>
        </div>

        <div class="section">
            <span class="section-title">PAYLAŞIM (DIŞA AKTAR)</span>
            <button class="btn-action btn-share" onclick="exportMarkers()">📊 VERİ KODUNU KOPYALA</button>
            <p style="font-size: 9px; color: var(--text-muted); margin: 5px 0;">*Tüm işaretçileri kod olarak panoya kopyalar.</p>
        </div>

        <div class="section">
            <span class="section-title">VERİ YÜKLE (İÇE AKTAR)</span>
            <textarea id="importArea" rows="2" placeholder="Kodu buraya yapıştır..."></textarea>
            <button class="btn-action btn-import" style="margin-top: 5px;" onclick="importMarkers()">📥 KODU HARİTAYA BAS</button>
        </div>

        <div class="section">
            <span class="section-title">STİL VE MOD</span>
            <div class="input-group">
                <select id="typeSelect" style="margin-bottom: 8px;">
                    <option value="green">🟢 YEŞİL</option>
                    <option value="red">🔴 KIRMIZI</option>
                    <option value="black">⚫ SİYAH</option>
                </select>
                <input type="range" id="sizeSlider" min="15" max="150" value="45">
            </div>
            <div class="switch-group" style="margin-top: 10px;">
                <span>EKLEME MODU</span>
                <label class="switch"><input type="checkbox" id="addMode" checked><span class="slider"></span></label>
            </div>
        </div>

        <div class="section">
            <button class="btn-action btn-clear" onclick="confirmClear()">MEKANI SIFIRLA</button>
            <button class="btn-action" style="background:#21262d; color:#8b949e; margin-top:5px;" onclick="logout()">ÇIKIŞ YAP</button>
        </div>
    </div>
    
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const _p = "knglrpsikersakatbırakır";

    function checkLogin() {
        if (document.getElementById('passInput').value === _p) {
            sessionStorage.setItem('map_auth', 'true');
            showMainContent();
        } else { alert("Şifre yanlış aşkım, bir daha dene."); }
    }

    function showMainContent() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        initApp();
    }

    window.onload = () => { if (sessionStorage.getItem('map_auth') === 'true') showMainContent(); };
    function logout() { sessionStorage.clear(); location.reload(); }
    function togglePanel() { document.getElementById('controls').classList.toggle('collapsed'); }

    let globalApp = null;

    function exportMarkers() {
        if (!globalApp) return;
        const data = globalApp.getMarkers();
        const code = btoa(JSON.stringify(data)); // Basit bir base64 şifreleme
        navigator.clipboard.writeText(code).then(() => {
            alert("Operasyon kodu panoya kopyalandı! Arkadaşına gönderebilirsin.");
        });
    }

    function importMarkers() {
        const code = document.getElementById('importArea').value.trim();
        if (!code) return alert("Önce kodu yapıştır aşkım!");
        try {
            const decodedData = JSON.parse(atob(code));
            if (confirm("Mevcut işaretçilerin üzerine yazılsın mı?")) {
                globalApp.setMarkers(decodedData);
                document.getElementById('importArea').value = "";
                alert("Veriler başarıyla yüklendi!");
            }
        } catch (e) {
            alert("Bu kod bozuk veya eksik, bir kontrol et bakalım.");
        }
    }

    function confirmClear() { if(confirm("Her şeyi siliyorum?")) globalApp.clearMarkers(); }

    function initApp() {
        const dbName = "MapStore_v95";
        let db, savedMarkers = [];
        const map = L.map('map', { crs: L.CRS.Simple, minZoom: -3, maxZoom: 3, zoomControl: false });
        let mapLayer = null, markerLayer = L.layerGroup().addTo(map);

        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("config");
            db.createObjectStore("markers", { keyPath: "id" });
        };

        request.onsuccess = e => {
            db = e.target.result;
            db.transaction("config").objectStore("config").get("img").onsuccess = ev => { if(ev.target.result) loadMap(ev.target.result); };
            db.transaction("markers").objectStore("markers").getAll().onsuccess = ev => { savedMarkers = ev.target.result || []; render(); };
        };

        function loadMap(url) {
            const img = new Image();
            img.onload = function() {
                if (mapLayer) map.removeLayer(mapLayer);
                const bounds = [[0, 0], [this.height, this.width]];
                mapLayer = L.imageOverlay(url, bounds).addTo(map);
                map.fitBounds(bounds);
                render();
            };
            img.src = url;
        }

        document.getElementById('mainMapInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                db.transaction("config", "readwrite").objectStore("config").put(ev.target.result, "img");
                loadMap(ev.target.result);
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        map.on('click', e => {
            if (!mapLayer || !document.getElementById('addMode').checked) return;
            const markerData = { 
                id: Date.now(), lat: e.latlng.lat, lng: e.latlng.lng, 
                size: parseInt(document.getElementById('sizeSlider').value), 
                type: document.getElementById('typeSelect').value
            };
            db.transaction("markers", "readwrite").objectStore("markers").add(markerData);
            savedMarkers.push(markerData);
            render();
        });

        function render() {
            markerLayer.clearLayers();
            savedMarkers.forEach(d => {
                let mClass = d.type === 'red' ? 'fill-red' : (d.type === 'green' ? 'fill-green' : (d.type === 'black' ? 'hollow-black' : ''));
                const icon = L.divIcon({ 
                    className: `pixel-marker ${mClass}`, 
                    iconSize: [d.size, d.size], 
                    iconAnchor: [d.size/2, d.size/2],
                    html: `<div></div>`
                });
                const m = L.marker([d.lat, d.lng], { icon: icon }).addTo(markerLayer);
                m.on('contextmenu', () => {
                    db.transaction("markers", "readwrite").objectStore("markers").delete(d.id);
                    savedMarkers = savedMarkers.filter(x => x.id !== d.id); 
                    render();
                });
            });
        }

        globalApp = { 
            getMarkers: () => savedMarkers,
            setMarkers: (newData) => {
                const tx = db.transaction("markers", "readwrite");
                const store = tx.objectStore("markers");
                store.clear();
                newData.forEach(m => store.add(m));
                savedMarkers = newData;
                render();
            },
            clearMarkers: () => {
                db.transaction("markers", "readwrite").objectStore("markers").clear();
                savedMarkers = []; render();
            }
        };
    }
</script>
</body>
</html>
