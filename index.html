<script>
    // Şifreyi parçalara bölerek ve anlamsız değişken isimleriyle gizliyoruz
    const _0x4a1 = "kngl"; 
    const _0x4a2 = "sike"; 
    const _0x4a3 = "rsak"; 
    const _0x4a4 = "atbı"; 
    const _0x4a5 = "rakır";

    // Giriş kontrolü yapan maskelenmiş fonksiyon
    async function checkLogin() {
        const _uVal = document.getElementById('passInput').value;
        const _rem = document.getElementById('rememberCheck').checked;
        
        // Şifre parçalarını birleştiriyoruz
        const _target = _0x4a1 + _0x4a2 + _0x4a3 + _0x4a4 + _0x4a5;

        // Karşılaştırma
        if (_uVal === _target) {
            if (_rem) {
                localStorage.setItem('hatirlaBeni', 'true');
            } else {
                sessionStorage.setItem('isLoggedIn', 'true');
            }
            showMainContent();
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    // Sayfa yüklendiğinde kontrol
    window.onload = function() {
        if (localStorage.getItem('hatirlaBeni') === 'true' || sessionStorage.getItem('isLoggedIn') === 'true') {
            showMainContent();
        }
    };

    function showMainContent() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        initApp();
    }

    function logout() {
        localStorage.removeItem('hatirlaBeni');
        sessionStorage.removeItem('isLoggedIn');
        location.reload();
    }

    document.getElementById('passInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkLogin();
    });

    // --- HARİTA VE VERİTABANI MANTIĞI (Aynı kalıyor) ---
    function initApp() {
        // ... (Geri kalan kodlar burada devam ediyor)
    }
</script>
