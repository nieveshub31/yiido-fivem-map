<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özel Harita Paneli</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0c141d; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-box { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 2px solid #00ff00; text-align: center; width: 280px; }
        .login-box input[type="password"] { padding: 12px; width: 100%; border-radius: 5px; border: 1px solid #444; background: #222; color: white; margin-bottom: 15px; box-sizing: border-box; }
        .remember-me { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 15px; font-size: 14px; color: #ccc; cursor: pointer; }
        .login-box button { width: 100%; padding: 12px; background: #00ff00; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; color: #000; }
        
        #main-content { display: none; }
        #map { height: 100vh; width: 100vw; background: #0c141d; }
        #controls { position: fixed; top: 10px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.95); padding: 15px; border-radius: 12px; border: 2px solid #444; width: 280px; max-height: 90vh; overflow-y: auto; }
        .section { border-bottom: 1px solid #333; padding-bottom: 12px; margin-bottom: 12px; }
        .section-title { font-weight: bold; font-size: 12px; color: #00ff00; text-transform: uppercase; margin-bottom: 8px; display: block; }
        input[type="file"], select, input[type="range"] { width: 100%; margin-top: 5px; }
        .pixel-marker { border: 2px solid white; display: flex; align-items: center; justify-content: center; }
        .pixel-marker div { width: 100%; height: 100%; background-size: contain !important; background-position: center !important; background-repeat: no-repeat !important; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>PANEL GİRİŞİ</h2>
        <input type="password" id="passInput" placeholder="Şifre...">
        <label class="remember-me"><input type="checkbox" id="rememberCheck"> Beni Hatırla</label>
        <button onclick="checkLogin()">GİRİŞ YAP</button>
        <p id="error-msg" style="color:#ff4444; font-size:12px; margin-top:10px; display:none;">Hatalı Şifre!</p>
    </div>
</div>

<div id="main-content">
    <div id="controls">
        <div class="section">
            <span class="section-title">1. HARİTA YÜKLE</span>
            <input type="file" id="mainMapInput" accept="image/*">
        </div>
        <div class="section">
            <span class="section-title">2. İŞARETCİ AYARLARI</span>
            <input type="file" id="markerImgInput" accept="image/*">
            <select id="typeSelect">
                <option value="red">Kırmızı Daire</option>
                <option value="green">Yeşil Daire</option>
                <option value="custom_img">Özel İkon</option>
            </select>
            <input type="range" id="sizeSlider" min="10" max="150" value="40">
        </div>
        <button onclick="logout()" style="width:100%; padding:10px; background:#c0392b; color:white; border:none; cursor:pointer; border-radius:5px;">ÇIKIŞ YAP</button>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // GİZLENMİŞ ŞİFRE KONTROLÜ
    const _s1="kngl", _s2="sike", _s3="rsak", _s4="atbı", _s5="rakır";
    
    function checkLogin() {
        const p = document.getElementById('passInput').value;
        const r = document.getElementById('rememberCheck').checked;
        if (p === (_s1+_s2+_s3+_s4+_s5)) {
            if (r) localStorage.setItem('map_session', 'active');
            else sessionStorage.setItem('map_session', 'active');
            showMainContent();
        } else { document.getElementById('error-msg').style.display = 'block'; }
    }

    function showMainContent() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        initApp();
    }

    window.onload = () => {
        if (localStorage.getItem('map_session')==='active' || sessionStorage.getItem('map_session')==='active') showMainContent();
    };

    function logout() {
        localStorage.removeItem('map_session');
        sessionStorage.removeItem('map_session');
        location.reload();
    }

    // HARİTA MOTORU
    function initApp() {
        const dbName = "MapStore_v4";
        let db, savedMarkers = [], customIcon = null;
        const map = L.map('map', { crs: L.CRS.Simple, minZoom: -3, maxZoom: 3 });
        let mapLayer = null, markerLayer = L.layerGroup().addTo(map);

        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("config");
            db.createObjectStore("markers", { keyPath: "id" });
        };

        request.onsuccess = e => {
            db = e.target.result;
            db.transaction("config").objectStore("config").get("img").onsuccess = ev => { if(ev.target.result) loadMap(ev.target.result); };
            db.transaction("markers").objectStore("markers").getAll().onsuccess = ev => { savedMarkers = ev.target.result || []; render(); };
        };

        function loadMap(url) {
            const img = new Image();
            img.onload = function() {
                if (mapLayer) map.removeLayer(mapLayer);
                const bounds = [[0, 0], [this.height, this.width]];
                mapLayer = L.imageOverlay(url, bounds).addTo(map);
                map.fitBounds(bounds);
                render();
            };
            img.src = url;
        }

        document.getElementById('mainMapInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                db.transaction("config", "readwrite").objectStore("config").put(ev.target.result, "img");
                loadMap(ev.target.result);
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('markerImgInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => { customIcon = ev.target.result; document.getElementById('typeSelect').value = 'custom_img'; };
            reader.readAsDataURL(e.target.files[0]);
        };

        map.on('click', e => {
            if (!mapLayer) return;
            const markerData = { id: Date.now(), lat: e.latlng.lat, lng: e.latlng.lng, size: parseInt(document.getElementById('sizeSlider').value), type: document.getElementById('typeSelect').value, img: document.getElementById('typeSelect').value === 'custom_img' ? customIcon : null };
            db.transaction("markers", "readwrite").objectStore("markers").add(markerData);
            savedMarkers.push(markerData);
            render();
        });

        function render() {
            markerLayer.clearLayers();
            savedMarkers.forEach(d => {
                const style = `background-image:${d.img?'url('+d.img+')':'none'}; background-color:${d.type==='red'?'rgba(255,0,0,0.6)':d.type==='green'?'rgba(0,255,0,0.6)':'transparent'}`;
                const icon = L.divIcon({ className: 'pixel-marker', iconSize: [d.size, d.size], iconAnchor: [d.size/2, d.size/2], html: `<div style="${style}"></div>` });
                const m = L.marker([d.lat, d.lng], { icon: icon, draggable: true }).addTo(markerLayer);
                m.on('dragend', ev => {
                    const found = savedMarkers.find(x => x.id === d.id);
                    found.lat = ev.target.getLatLng().lat; found.lng = ev.target.getLatLng().lng;
                    db.transaction("markers", "readwrite").objectStore("markers").put(found);
                });
                m.on('contextmenu', () => {
                    db.transaction("markers", "readwrite").objectStore("markers").delete(d.id);
                    savedMarkers = savedMarkers.filter(x => x.id !== d.id); render();
                });
            });
        }
    }
</script>
</body>
</html>
