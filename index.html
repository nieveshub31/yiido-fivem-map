<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA 5 Harita - Hareketli ve Sabit İşaretçiler</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; font-family: 'Segoe UI', sans-serif; color: white; }
        #map { height: 100vh; width: 100vw; background: #0c141d; }

        #controls {
            position: fixed; top: 10px; left: 10px; z-index: 1000;
            background: rgba(0,0,0,0.9); padding: 20px; border-radius: 10px;
            border: 1px solid #444; width: 260px; max-height: 90vh; overflow-y: auto;
        }

        .section { border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 15px; }
        .section-title { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 10px; display: block; }
        
        input[type="file"], input[type="range"] { width: 100%; cursor: pointer; margin-top: 5px; }
        .val-label { font-size: 12px; color: #00ff00; }

        select { width: 100%; padding: 8px; background: #333; color: white; border: 1px solid #555; border-radius: 4px; }
        
        .toggle-area { display: flex; align-items: center; justify-content: space-between; background: #222; padding: 8px; border-radius: 5px; margin-top: 5px; }
        
        button {
            width: 100%; padding: 10px; border: none;
            color: white; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; background: #c0392b;
        }

        /* İşaretçi Stilleri */
        .pixel-marker { 
            border: 2px solid white; 
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pixel-marker div { 
            width: 100%; height: 100%; 
            background-size: contain !important; 
            background-position: center !important; 
            background-repeat: no-repeat !important; 
            border-radius: inherit;
        }

        .marker-red { background-color: rgba(255, 0, 0, 0.6); }
        .marker-green { background-color: rgba(0, 255, 0, 0.6); }
        
        /* Düzenleme modu açıkken imleç değişsin */
        .edit-mode-active .pixel-marker { cursor: move !important; }
    </style>
</head>
<body>

<div id="controls">
    <div class="section">
        <span class="section-title">1. Haritaları Yükle</span>
        <input type="file" id="mainMapInput" accept="image/*" title="Ana Harita">
        <input type="file" id="markerImgInput" accept="image/*" style="margin-top:10px;" title="İşaretçi İkonu">
    </div>

    <div class="section">
        <div class="toggle-area">
            <span>Düzenleme (Taşıma)</span>
            <input type="checkbox" id="editMode" checked>
        </div>
        <small style="font-size: 10px; color: #aaa;">*Kapatırsan objeler kilitlenir.</small>
    </div>

    <div class="section">
        <span class="section-title">2. Boyut: <span id="sizeVal" class="val-label">40px</span></span>
        <input type="range" id="sizeSlider" min="10" max="150" value="40">
    </div>

    <div class="section">
        <span class="section-title">3. Tip Seçimi</span>
        <select id="typeSelect">
            <option value="red">Kırmızı Daire</option>
            <option value="green">Yeşil Daire</option>
            <option value="custom_img">Yüklediğim Görsel</option>
        </select>
    </div>

    <button onclick="clearAll()">Hafızayı Sıfırla</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let savedData = JSON.parse(localStorage.getItem('gta_final_data')) || [];
    let savedMap = localStorage.getItem('gta_final_map');
    let customImgBase64 = null;

    const map = L.map('map', { crs: L.CRS.Simple, minZoom: -4, maxZoom: 4 });
    let currentMapLayer = null;
    let markersLayer = L.layerGroup().addTo(map);

    // Harita Yükleme
    document.getElementById('mainMapInput').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { localStorage.setItem('gta_final_map', ev.target.result); initMap(ev.target.result); };
        reader.readAsDataURL(e.target.files[0]);
    };

    // İkon Yükleme
    document.getElementById('markerImgInput').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { 
            customImgBase64 = ev.target.result; 
            document.getElementById('typeSelect').value = 'custom_img';
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function initMap(src) {
        const img = new Image();
        img.onload = function() {
            if (currentMapLayer) map.removeLayer(currentMapLayer);
            const bounds = [[0, 0], [this.height, this.width]];
            currentMapLayer = L.imageOverlay(src, bounds).addTo(map);
            map.fitBounds(bounds);
            renderMarkers();
        };
        img.src = src;
    }

    // Tıklayınca Ekle
    map.on('click', function(e) {
        if (!currentMapLayer) return;
        const type = document.getElementById('typeSelect').value;
        const size = parseInt(document.getElementById('sizeSlider').value);
        
        const obj = {
            id: Date.now(),
            lat: e.latlng.lat,
            lng: e.latlng.lng,
            size: size,
            type: type,
            img: type === 'custom_img' ? customImgBase64 : null
        };
        savedData.push(obj);
        saveAndRender();
    });

    function renderMarkers() {
        markersLayer.clearLayers();
        const isEditable = document.getElementById('editMode').checked;
        
        if(isEditable) document.body.classList.add('edit-mode-active');
        else document.body.classList.remove('edit-mode-active');

        savedData.forEach(data => {
            let divStyle = `width:100%; height:100%;`;
            if(data.type === 'custom_img' && data.img) divStyle += `background-image: url(${data.img});`;

            const icon = L.divIcon({
                className: `pixel-marker marker-${data.type}`,
                iconSize: [data.size, data.size],
                iconAnchor: [data.size/2, data.size/2],
                html: `<div style="${divStyle}"></div>`
            });

            const marker = L.marker([data.lat, data.lng], { icon: icon, draggable: isEditable }).addTo(markersLayer);

            // Hareket bitince yeni konumu kaydet
            marker.on('dragend', function(ev) {
                const newPos = ev.target.getLatLng();
                const found = savedData.find(d => d.id === data.id);
                if (found) { found.lat = newPos.lat; found.lng = newPos.lng; saveToStorage(); }
            });

            // Sağ tıkla silme
            marker.on('contextmenu', () => {
                savedData = savedData.filter(d => d.id !== data.id);
                saveAndRender();
            });
        });
    }

    const slider = document.getElementById('sizeSlider');
    slider.oninput = () => document.getElementById('sizeVal').innerText = slider.value + "px";

    function saveAndRender() { saveToStorage(); renderMarkers(); }
    function saveToStorage() { localStorage.setItem('gta_final_data', JSON.stringify(savedData)); }
    function clearAll() { if(confirm("Tüm veriler silinsin mi?")) { localStorage.clear(); location.reload(); } }

    document.getElementById('editMode').onchange = renderMarkers;
    if (savedMap) initMap(savedMap);
    document.getElementById('map').oncontextmenu = () => false;
</script>

</body>
</html>
