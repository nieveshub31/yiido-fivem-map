<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yyiido nieves - Map System v1.0</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00e5ff;
            --danger-color: #ff3366;
            --info-color: #a277ff;
            --bg-dark: #050505;
            --panel-bg: rgba(10, 12, 16, 0.85);
            --border-color: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(0, 0, 0, 0.4);
            --text-main: #f0f4f8;
            --text-muted: #718096;
            --font-main: 'Inter', sans-serif;
            --font-tech: 'JetBrains Mono', monospace;
        }
        
        body, html, #map, .leaflet-container, * { cursor: crosshair !important; }
        body { margin: 0; padding: 0; background: var(--bg-dark); font-family: var(--font-main); color: var(--text-main); overflow: hidden; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        #login-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle at center, #0a1118 0%, #030405 100%); 
            z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .login-box { 
            background: var(--panel-bg); padding: 40px; border-radius: 30px; 
            border: 1px solid var(--border-color); text-align: center; width: 380px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); backdrop-filter: blur(50px);
        }
        .login-box h2 { letter-spacing: 4px; font-size: 16px; font-family: var(--font-tech); margin-bottom: 25px; }
        .login-box input { 
            padding: 15px; width: 100%; border-radius: 15px; border: 1px solid var(--border-color); 
            background: var(--input-bg); color: white; margin-bottom: 20px; outline: none; text-align: center;
        }
        .login-box button { 
            width: 100%; padding: 15px; background: var(--primary-color); border: none; 
            font-weight: 800; border-radius: 15px; color: #000; cursor: pointer !important;
        }

        #main-content { display: none; }
        #map { height: 100vh; width: 100vw; z-index: 1; }

        /* --- LUX SOL PANEL --- */
        #controls {
            position: fixed; top: 80px; left: 20px; z-index: 1000;
            background: var(--panel-bg); padding: 25px; border-radius: 24px;
            border: 1px solid var(--border-color); width: 280px;
            backdrop-filter: blur(40px); box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #controls.collapsed { transform: translateX(-350px); opacity: 0; }

        .panel-header { font-family: var(--font-tech); font-size: 10px; letter-spacing: 3px; color: var(--primary-color); margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; text-transform: uppercase; }
        .section-title { font-family: var(--font-tech); font-size: 9px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; display: block; }
        
        input[type="text"], select, input[type="file"] {
            width: 100%; background: var(--input-bg); color: #fff; border: 1px solid var(--border-color);
            border-radius: 12px; padding: 10px 14px; font-size: 12px; margin-bottom: 12px; outline: none;
        }
        input[type="text"]:focus { border-color: var(--primary-color); }

        .switch-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; font-size: 11px; font-family: var(--font-tech); }
        .switch { position: relative; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer !important; top: 0; left: 0; right: 0; bottom: 0; background: #222; border-radius: 20px; transition: .3s; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: #555; border-radius: 50%; transition: .3s; }
        input:checked + .slider { background: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(16px); background: #000; }

        .btn-action { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); background: rgba(255,255,255,0.03); color: #fff; font-size: 10px; font-weight: 700; font-family: var(--font-tech); cursor: pointer !important; margin-bottom: 8px; transition: 0.3s; }
        .btn-action:hover { background: rgba(255,255,255,0.08); border-color: var(--primary-color); }

        /* --- SAĞ PANEL (FIXED LIST) --- */
        #gta-checklist {
            position: fixed; top: 20px; right: 20px; z-index: 1001;
            display: flex; flex-direction: column; width: 320px;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); transform: translateX(120%);
        }
        #gta-checklist.active { transform: translateX(0); }

        .checklist-inner {
            background: var(--panel-bg); border: 1px solid var(--border-color);
            border-radius: 24px; padding: 20px; max-height: 85vh; overflow-y: auto;
            backdrop-filter: blur(40px); box-shadow: 0 30px 70px rgba(0,0,0,0.7);
            margin-top: 60px;
        }
        
        .gta-list-item {
            background: rgba(255,255,255,0.03); padding: 14px; margin-bottom: 10px;
            border-radius: 16px; border: 1px solid var(--border-color);
            cursor: grab !important; transition: 0.2s; display: flex; align-items: center; gap: 12px;
        }
        .gta-list-item:active { cursor: grabbing !important; }
        .gta-list-item.dragging { opacity: 0.2; transform: scale(0.95); }
        
        .item-info { flex: 1; display: flex; flex-direction: column; gap: 4px; pointer-events: none; }
        .item-name { font-size: 12px; font-weight: 700; color: #fff; text-transform: uppercase; }
        .item-meta { font-size: 9px; color: var(--text-muted); font-family: var(--font-tech); }
        .item-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 10px currentColor; }

        #checklist-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 1002;
            background: var(--panel-bg); color: var(--primary-color);
            border: 1px solid var(--border-color); padding: 12px 20px; border-radius: 15px;
            font-family: var(--font-tech); font-weight: 800; cursor: pointer !important;
            backdrop-filter: blur(20px); transition: 0.3s;
        }
        #checklist-toggle.active { background: var(--primary-color); color: #000; }

        #main-logo {
            position: fixed; top: 20px; left: 20px; z-index: 1001;
            background: var(--panel-bg); color: #fff; padding: 12px 20px; border-radius: 15px;
            font-weight: 900; font-family: var(--font-tech); border: 1px solid var(--border-color);
            cursor: pointer !important;
        }

        /* MARKER STYLES */
        .marker-label {
            position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: #fff; padding: 5px 12px; border-radius: 8px;
            font-size: 10px; font-weight: 800; font-family: var(--font-tech); border: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap; pointer-events: none; backdrop-filter: blur(5px);
        }
        .icon-box { width: 100%; height: 100%; border-radius: 50%; background-size: cover; border: 2px solid #fff; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .fill-red { border-color: var(--danger-color); background-color: rgba(255, 51, 102, 0.3); }
        .fill-green { border-color: var(--primary-color); background-color: rgba(0, 229, 255, 0.3); }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="login-overlay">
    <div class="login-box">
        <h2>YYIIDO X KNGLRP X NİEVES</h2>
        <input type="password" id="passInput" placeholder="••••••••">
        <button onclick="checkLogin()">SİSTEME GİR</button>
    </div>
</div>

<div id="main-content">
    <div id="main-logo" onclick="togglePanel()">KNGLRP</div>
    <button id="checklist-toggle" onclick="toggleChecklist()">LISTE</button>

    <div id="gta-checklist">
        <div class="checklist-inner" id="checklist-items"></div>
    </div>

    <div id="controls">
        <div class="panel-header">YYİİDO NİEVES</div>
        
        <div style="margin-bottom: 20px;">
            <span class="section-title">HARİTA</span>
            <input type="file" id="mainMapInput" accept="image/*">
        </div>

        <div style="margin-bottom: 20px;">
            <span class="section-title">İŞARETÇİ AYARI</span>
            <input type="text" id="markerTextInput" placeholder="Etiket İsmi...">
            <select id="typeSelect">
                <option value="green">GÜVENLİ (MAVİ)</option>
                <option value="red">TEHLİKE (KIRMIZI)</option>
                <option value="black">STANDART (BEYAZ)</option>
                <option value="custom_img">ÖZEL RESİM</option>
            </select>
            <input type="file" id="markerImgInput" accept="image/*">
            <span class="section-title">BOYUT: <span id="sizeVal">40</span>px</span>
            <input type="range" id="sizeSlider" min="15" max="120" value="40" style="width:100%" oninput="document.getElementById('sizeVal').innerText=this.value">
        </div>

        <div>
            <span class="section-title">MODLAR</span>
            <div class="switch-group"><span>DÜZENLEME</span><label class="switch"><input type="checkbox" id="editMode" checked onchange="refreshMap()"><span class="slider"></span></label></div>
            <div class="switch-group"><span>EKLEME</span><label class="switch"><input type="checkbox" id="addMode" checked><span class="slider"></span></label></div>
        </div>

        <div style="margin-top:20px;">
            <button class="btn-action" onclick="exportToCode()">VERİYİ KOPYALA</button>
            <button class="btn-action" onclick="importFromCode()">VERİ YÜKLE</button>
            <button class="btn-action" style="color:var(--danger-color)" onclick="confirmClear()">SIFIRLA</button>
            <button class="btn-action" style="opacity:0.5; margin-top:10px;" onclick="logout()">ÇIKIŞ YAP</button>
        </div>
    </div>
    
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const _p = "knglrpsikersakatbırakır";
    let db, savedMarkers = [], globalApp = null, customIcon = null;

    function checkLogin() {
        if (document.getElementById('passInput').value === _p) {
            sessionStorage.setItem('map_auth', 'true');
            showMainContent();
        } else { alert("Erişim reddedildi."); }
    }

    function showMainContent() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        initApp();
    }

    window.onload = () => { if (sessionStorage.getItem('map_auth') === 'true') showMainContent(); };
    function logout() { sessionStorage.clear(); location.reload(); }
    function togglePanel() { document.getElementById('controls').classList.toggle('collapsed'); }
    function toggleChecklist() {
        document.getElementById('gta-checklist').classList.toggle('active');
        document.getElementById('checklist-toggle').classList.toggle('active');
    }

    function refreshMap() { if(globalApp) globalApp.render(); }
    function confirmClear() { if(confirm("Tüm noktalar silinecek?")) globalApp.clearMarkers(); }
    function exportToCode() { navigator.clipboard.writeText(JSON.stringify(savedMarkers)).then(() => alert("Kopyalandı!")); }
    function importFromCode() {
        const code = prompt("Kodu yapıştır:");
        if(code) { try { globalApp.importData(JSON.parse(code)); } catch(e) { alert("Hata!"); } }
    }

    function initApp() {
        const map = L.map('map', { crs: L.CRS.Simple, minZoom: -3, maxZoom: 3, zoomControl: false });
        let mapLayer = null, markerLayer = L.layerGroup().addTo(map);

        const request = indexedDB.open("LuxMap_v3", 1);
        request.onupgradeneeded = e => {
            db = e.target.result;
            db.createObjectStore("config");
            db.createObjectStore("markers", { keyPath: "id" });
        };

        request.onsuccess = e => {
            db = e.target.result;
            db.transaction("config").objectStore("config").get("img").onsuccess = ev => { if(ev.target.result) loadMap(ev.target.result); };
            db.transaction("markers").objectStore("markers").getAll().onsuccess = ev => { 
                savedMarkers = ev.target.result || []; 
                savedMarkers.sort((a,b) => (a.order || 0) - (b.order || 0));
                render(); 
            };
        };

        function loadMap(url) {
            const img = new Image();
            img.onload = function() {
                if (mapLayer) map.removeLayer(mapLayer);
                const bounds = [[0, 0], [this.height, this.width]];
                mapLayer = L.imageOverlay(url, bounds).addTo(map);
                map.fitBounds(bounds);
                render();
            };
            img.src = url;
        }

        document.getElementById('mainMapInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                db.transaction("config", "readwrite").objectStore("config").put(ev.target.result, "img");
                loadMap(ev.target.result);
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('markerImgInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => { customIcon = ev.target.result; document.getElementById('typeSelect').value = 'custom_img'; };
            reader.readAsDataURL(e.target.files[0]);
        };

        map.on('click', e => {
            if (!mapLayer || !document.getElementById('addMode').checked) return;
            const markerData = { 
                id: "id_" + Date.now() + Math.random(), 
                lat: e.latlng.lat, lng: e.latlng.lng, 
                size: parseInt(document.getElementById('sizeSlider').value), 
                type: document.getElementById('typeSelect').value,
                text: document.getElementById('markerTextInput').value.trim(), 
                img: document.getElementById('typeSelect').value === 'custom_img' ? customIcon : null,
                order: savedMarkers.length
            };
            db.transaction("markers", "readwrite").objectStore("markers").add(markerData);
            savedMarkers.push(markerData);
            render();
        });

        function render() {
            markerLayer.clearLayers();
            const listContainer = document.getElementById('checklist-items');
            listContainer.innerHTML = ''; 
            const isEdit = document.getElementById('editMode').checked;

            savedMarkers.forEach((d) => {
                // List Item
                const item = document.createElement('div');
                item.className = 'gta-list-item';
                item.draggable = true;
                item.dataset.id = d.id; // Sabit ID atıyoruz
                
                let color = d.type==='red'?'#ff3366':(d.type==='green'?'#00e5ff':'#fff');
                item.innerHTML = `
                    <div class="item-dot" style="color:${color}; background:currentColor"></div>
                    <div class="item-info">
                        <div class="item-name">${d.text || 'İSİMSİZ NOKTA'}</div>
                        <div class="item-meta">X: ${d.lng.toFixed(0)} Y: ${d.lat.toFixed(0)}</div>
                    </div>
                `;
                item.onclick = () => map.flyTo([d.lat, d.lng], 0);

                // Drag & Drop Logic (ID tabanlı Fix)
                item.ondragstart = e => { e.dataTransfer.setData("text/id", d.id); item.classList.add('dragging'); };
                item.ondragend = () => item.classList.remove('dragging');
                item.ondragover = e => e.preventDefault();
                item.ondrop = e => {
                    e.preventDefault();
                    const draggedId = e.dataTransfer.getData("text/id");
                    const targetId = d.id;
                    if(draggedId === targetId) return;

                    const draggedIdx = savedMarkers.findIndex(x => x.id === draggedId);
                    const targetIdx = savedMarkers.findIndex(x => x.id === targetId);

                    const [movedItem] = savedMarkers.splice(draggedIdx, 1);
                    savedMarkers.splice(targetIdx, 0, movedItem);

                    const tx = db.transaction("markers", "readwrite");
                    savedMarkers.forEach((m, i) => { m.order = i; tx.objectStore("markers").put(m); });
                    render();
                };

                listContainer.appendChild(item);

                // Map Marker
                const icon = L.divIcon({ 
                    className: `pixel-marker`, 
                    iconSize: [d.size, d.size], 
                    iconAnchor: [d.size/2, d.size/2],
                    html: `<div class="icon-box ${d.type==='red'?'fill-red':(d.type==='green'?'fill-green':'')}" style="${d.img ? 'background-image:url('+d.img+')' : ''}">
                        ${d.text ? `<div class="marker-label">${d.text}</div>` : ''}
                    </div>`
                });
                const m = L.marker([d.lat, d.lng], { icon, draggable: isEdit }).addTo(markerLayer);
                if(isEdit) {
                    m.on('dragend', ev => {
                        d.lat = ev.target.getLatLng().lat; d.lng = ev.target.getLatLng().lng;
                        db.transaction("markers", "readwrite").objectStore("markers").put(d);
                        render();
                    });
                    m.on('contextmenu', () => {
                        db.transaction("markers", "readwrite").objectStore("markers").delete(d.id);
                        savedMarkers = savedMarkers.filter(x => x.id !== d.id);
                        render();
                    });
                }
            });
        }
        globalApp = { render, clearMarkers: () => { db.transaction("markers","readwrite").objectStore("markers").clear(); savedMarkers=[]; render(); }, importData: (data) => {
            const tx = db.transaction("markers","readwrite");
            data.forEach(x => tx.objectStore("markers").put(x));
            tx.oncomplete = () => location.reload();
        }};
    }
    document.getElementById('passInput').onkeypress = e => { if(e.key==='Enter') checkLogin() };
</script>
</body>
</html>
